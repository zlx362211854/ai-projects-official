name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ai-projects-official-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Pull code and build on server
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          DEPLOY_HOST="$(printf '%s' "$DEPLOY_HOST" | sed '/^[[:space:]]*$/d' | head -n 1 | tr -d '\r')"
          DEPLOY_USER="$(printf '%s' "$DEPLOY_USER" | sed '/^[[:space:]]*$/d' | head -n 1 | tr -d '\r')"
          DEPLOY_PORT="$(printf '%s' "$DEPLOY_PORT" | sed '/^[[:space:]]*$/d' | head -n 1 | tr -d '\r')"
          PROJECT_PATH="$(printf '%s' "$PROJECT_PATH" | sed '/^[[:space:]]*$/d' | head -n 1 | tr -d '\r')"
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PORT"
          test -n "$PROJECT_PATH"
          test -n "$DEPLOY_SSH_KEY"
          {
            echo "DEPLOY_HOST=$DEPLOY_HOST"
            echo "DEPLOY_USER=$DEPLOY_USER"
            echo "DEPLOY_PORT=$DEPLOY_PORT"
            echo "PROJECT_PATH=$PROJECT_PATH"
          } >> "$GITHUB_ENV"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pull latest code and build
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" PROJECT_PATH="$PROJECT_PATH" 'bash -s' <<'EOF'
            set -e
            cd "$PROJECT_PATH"
            git pull --ff-only origin main
            npm ci
            npm run build
          EOF
