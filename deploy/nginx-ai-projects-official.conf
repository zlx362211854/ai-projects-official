server {
    listen 80;
    server_name stackfield.org www.stackfield.org;

    root /projects/ai-projects-official/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
